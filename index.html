            padding: 10px 16px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.2s;

        .action-btn:hover {

            color: #fff;
            border-color: #e65100;
        }

            color: #000;

            padding: 22px;

            font-weight: bold;

                <img src="${item.url}" class="item-img" id="current-img">
                <div class="item-name">${item.name}</div>
                <div class="item-desc" id="current-desc">${item.desc}</div>
                <div class="action-group">
                    <button class="action-btn" onclick="copyText()">텍스트 복사</button>
                    <button class="action-btn" onclick="saveImg('${item.url}', '${item.name}')">이미지 저장</button>
                    <button class="action-btn" onclick="window.open('${item.url}', '_blank')">원본 링크</button>
                </div>
            `;
        }

        function copyText() {
            const name = document.querySelector('.item-name').innerText;
            const desc = document.getElementById('current-desc').innerText;
            const fullText = `${name}\n\n${desc}`;
            
            navigator.clipboard.writeText(fullText).then(() => {
                alert("아이템 정보가 복사되었습니다.");
            });
        }

        async function saveImg(url, name) {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = `${name}.png`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(blobUrl);
            } catch (e) {
                window.open(url, '_blank');
            }
        }
    </script>
</body>
</html>
